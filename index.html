<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bitpanda Portfolio Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(135deg, #1a0a2e 0%, #2d1b4e 100%);
    color: #e8e8f0;
    min-height: 100vh;
    padding: 20px;
  }
  .container { max-width: 1200px; margin: 0 auto; }
  h1 { font-size: 2em; margin-bottom: 20px; color: #fff; }
  h2 { font-size: 1.3em; margin: 24px 0 12px; color: #c9b8ff; border-bottom: 1px solid #4a3a6a; padding-bottom: 6px; }
  .status {
    padding: 10px 14px; border-radius: 8px; margin-bottom: 16px;
    background: rgba(255,255,255,0.05); font-size: 0.9em;
  }
  .status.error { background: rgba(220,60,60,0.2); border-left: 3px solid #e04444; }
  .status.ok { background: rgba(60,180,120,0.15); border-left: 3px solid #3cb478; }
  .kpi-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 14px; margin-bottom: 20px;
  }
  .kpi {
    background: rgba(255,255,255,0.06); border-radius: 10px; padding: 16px;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .kpi-label { font-size: 0.8em; color: #a090c0; text-transform: uppercase; letter-spacing: 0.5px; }
  .kpi-value { font-size: 1.6em; font-weight: 600; margin-top: 6px; color: #fff; }
  .kpi-value.positive { color: #5ee8a0; }
  .kpi-value.negative { color: #ff8080; }
  table {
    width: 100%; border-collapse: collapse; background: rgba(255,255,255,0.04);
    border-radius: 8px; overflow: hidden; margin-bottom: 16px;
  }
  th, td { padding: 10px 14px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.06); }
  th { background: rgba(255,255,255,0.08); font-size: 0.85em; color: #c9b8ff; text-transform: uppercase; letter-spacing: 0.5px; }
  td.num { text-align: right; font-variant-numeric: tabular-nums; }
  button {
    background: #6b4ba8; color: #fff; border: none; padding: 10px 20px;
    border-radius: 6px; cursor: pointer; font-size: 0.95em; margin-bottom: 16px;
  }
  button:hover { background: #7d5cb8; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .loader { display: inline-block; width: 14px; height: 14px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="container">
  <h1>🐼 Bitpanda Portfolio Dashboard</h1>
  <button id="reloadBtn" onclick="loadAll()">🔄 Ricarica dati</button>
  <div id="status" class="status">Pronto. Clicca "Ricarica dati" per iniziare.</div>

  <h2>Riepilogo</h2>
  <div class="kpi-grid" id="kpiGrid"></div>

  <h2>💰 Crypto</h2>
  <div id="crypto"></div>

  <h2>📈 ETF / Index / Securities</h2>
  <div id="etf"></div>

  <h2>🥇 Metalli e Materie Prime</h2>
  <div id="commodity"></div>

  <h2>💵 Wallet Fiat</h2>
  <div id="fiat"></div>
</div>

<script>
// ⚠️ Sostituire con l'URL Render dopo il deploy
const PROXY_URL = 'https://bitpanda-proxy.onrender.com';

const fmt = (n, d = 2) => Number(n).toLocaleString('it-IT', { minimumFractionDigits: d, maximumFractionDigits: d });
const fmtEur = n => `€ ${fmt(n)}`;

function setStatus(msg, type = '') {
  const el = document.getElementById('status');
  el.className = 'status ' + type;
  el.innerHTML = msg;
}

function getPrice(ticker, symbol) {
  const t = ticker?.[symbol];
  if (!t) return 0;
  return parseFloat(t.EUR || 0);
}

function renderKPI(data) {
  const grid = document.getElementById('kpiGrid');
  grid.innerHTML = '';
  
  const items = [
    { label: 'Capitale versato', value: fmtEur(data.capitaleVersato) },
    { label: 'Valore attuale', value: fmtEur(data.valoreAttuale) },
    { label: 'Risultato netto', value: fmtEur(data.risultato), cls: data.risultato >= 0 ? 'positive' : 'negative' },
    { label: 'ROI', value: fmt(data.roi) + ' %', cls: data.roi >= 0 ? 'positive' : 'negative' },
    { label: 'Totale acquisti', value: fmtEur(data.totaleAcquisti) },
    { label: 'Totale vendite', value: fmtEur(data.totaleVendite) },
    { label: 'Reward ricevuti', value: fmtEur(data.totaleReward) }
  ];
  
  items.forEach(i => {
    grid.innerHTML += `
      <div class="kpi">
        <div class="kpi-label">${i.label}</div>
        <div class="kpi-value ${i.cls || ''}">${i.value}</div>
      </div>`;
  });
}

function renderAssetTable(containerId, wallets, ticker) {
  const container = document.getElementById(containerId);
  const rows = wallets
    .map(w => {
      const a = w.attributes;
      const symbol = a.cryptocoin_symbol;
      const balance = parseFloat(a.balance || 0);
      const price = getPrice(ticker, symbol);
      const value = balance * price;
      return { symbol, name: a.name, balance, price, value };
    })
    .filter(r => r.balance > 0)
    .sort((a, b) => b.value - a.value);
  
  if (rows.length === 0) {
    container.innerHTML = '<p style="color:#888;padding:10px;">Nessun asset.</p>';
    return;
  }
  
  let html = `<table><thead><tr>
    <th>Simbolo</th><th>Nome</th>
    <th class="num">Quantità</th><th class="num">Prezzo</th><th class="num">Valore</th>
  </tr></thead><tbody>`;
  rows.forEach(r => {
    html += `<tr>
      <td><strong>${r.symbol}</strong></td>
      <td>${r.name}</td>
      <td class="num">${fmt(r.balance, 6)}</td>
      <td class="num">${fmtEur(r.price)}</td>
      <td class="num">${fmtEur(r.value)}</td>
    </tr>`;
  });
  html += '</tbody></table>';
  container.innerHTML = html;
}

function renderFiat(fiats) {
  const container = document.getElementById('fiat');
  const rows = (fiats.data || [])
    .map(w => ({
      symbol: w.attributes.fiat_symbol,
      name: w.attributes.name,
      balance: parseFloat(w.attributes.balance || 0)
    }))
    .filter(r => r.balance > 0);
  
  if (rows.length === 0) {
    container.innerHTML = '<p style="color:#888;padding:10px;">Nessun fiat.</p>';
    return;
  }
  
  let html = '<table><thead><tr><th>Valuta</th><th>Nome</th><th class="num">Saldo</th></tr></thead><tbody>';
  rows.forEach(r => {
    html += `<tr><td><strong>${r.symbol}</strong></td><td>${r.name}</td><td class="num">${fmt(r.balance)}</td></tr>`;
  });
  html += '</tbody></table>';
  container.innerHTML = html;
}

function extractWallets(assets, categoryKey) {
  try {
    return assets?.data?.attributes?.[categoryKey]?.attributes?.wallets || [];
  } catch { return []; }
}

function calcPortfolioValue(assets, ticker) {
  let total = 0;
  ['cryptocoin', 'commodity', 'index', 'security', 'equity_security'].forEach(cat => {
    const wallets = extractWallets(assets, cat);
    wallets.forEach(w => {
      const bal = parseFloat(w.attributes.balance || 0);
      const price = getPrice(ticker, w.attributes.cryptocoin_symbol);
      total += bal * price;
    });
  });
  // Somma anche il fiat
  return total;
}

function calcFiatTotal(fiats) {
  return (fiats.data || []).reduce((sum, w) => sum + parseFloat(w.attributes.balance || 0), 0);
}

function calcFromTransactions(fiatTx, trades) {
  let capitaleVersato = 0;
  let totaleAcquisti = 0;
  let totaleVendite = 0;
  let totaleReward = 0;
  
  // Depositi: type === 'deposit' sul fiat wallet
  fiatTx.forEach(tx => {
    const a = tx.attributes || {};
    const amount = parseFloat(a.amount || 0);
    const type = (a.type || '').toLowerCase();
    if (type === 'deposit') capitaleVersato += amount;
  });
  
  // Trades
  trades.forEach(t => {
    const a = t.attributes || {};
    const amountFiat = parseFloat(a.amount_fiat || 0);
    const type = (a.type || '').toLowerCase();
    
    if (type === 'buy') totaleAcquisti += amountFiat;
    else if (type === 'sell') totaleVendite += amountFiat;
    else if (type === 'reward' || type === 'deposit') totaleReward += amountFiat;
  });
  
  return { capitaleVersato, totaleAcquisti, totaleVendite, totaleReward };
}

async function loadAll() {
  const btn = document.getElementById('reloadBtn');
  btn.disabled = true;
  setStatus('<span class="loader"></span>Caricamento portfolio...', '');
  
  try {
    // 1. Portfolio (asset + fiat + ticker)
    const pRes = await fetch(`${PROXY_URL}/portfolio`);
    if (!pRes.ok) throw new Error(`Portfolio HTTP ${pRes.status}`);
    const { assets, fiats, ticker } = await pRes.json();
    
    setStatus('<span class="loader"></span>Caricamento storico transazioni...', '');
    
    // 2. Summary (depositi + trades)
    const sRes = await fetch(`${PROXY_URL}/summary`);
    if (!sRes.ok) throw new Error(`Summary HTTP ${sRes.status}`);
    const { fiatTransactions, trades } = await sRes.json();
    
    // 3. Calcoli
    const valoreAsset = calcPortfolioValue(assets, ticker);
    const valoreFiat = calcFiatTotal(fiats);
    const valoreAttuale = valoreAsset + valoreFiat;
    const { capitaleVersato, totaleAcquisti, totaleVendite, totaleReward } = calcFromTransactions(fiatTransactions, trades);
    const risultato = valoreAttuale - capitaleVersato;
    const roi = capitaleVersato > 0 ? (risultato / capitaleVersato) * 100 : 0;
    
    renderKPI({ capitaleVersato, valoreAttuale, risultato, roi, totaleAcquisti, totaleVendite, totaleReward });
    
    // 4. Tabelle
    renderAssetTable('crypto', extractWallets(assets, 'cryptocoin'), ticker);
    const etfWallets = [
      ...extractWallets(assets, 'index'),
      ...extractWallets(assets, 'security'),
      ...extractWallets(assets, 'equity_security')
    ];
    renderAssetTable('etf', etfWallets, ticker);
    renderAssetTable('commodity', extractWallets(assets, 'commodity'), ticker);
    renderFiat(fiats);
    
    setStatus(`✅ Dati aggiornati — ${new Date().toLocaleTimeString('it-IT')}`, 'ok');
  } catch (err) {
    console.error(err);
    setStatus(`❌ Errore: ${err.message}`, 'error');
  } finally {
    btn.disabled = false;
  }
}
</script>
</body>
</html>
