<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bitpanda Debug</title>
<style>
  body{background:#0d0f14;color:#e8eaf2;font-family:monospace;padding:20px;font-size:13px;}
  input{background:#1a1e28;border:1px solid #252a38;color:#e8eaf2;padding:10px;width:100%;margin-bottom:10px;border-radius:6px;font-size:13px;}
  button{background:#c8a96e;color:#0d0f14;border:none;padding:10px 20px;border-radius:6px;font-weight:bold;cursor:pointer;margin-right:8px;margin-bottom:10px;}
  .box{background:#13161e;border:1px solid #252a38;border-radius:8px;padding:14px;margin-bottom:12px;}
  .box h3{color:#c8a96e;margin-bottom:8px;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;}
  pre{white-space:pre-wrap;word-break:break-all;font-size:11px;color:#a0a8c0;line-height:1.6;max-height:300px;overflow-y:auto;}
  .ok{color:#52c98a;} .err{color:#e05c6a;}
</style>
</head>
<body>
<h2 style="color:#c8a96e;margin-bottom:16px">Bitpanda · Debug</h2>
<div class="box">
  <h3>API Key</h3>
  <input type="password" id="apiKey" placeholder="Incolla la tua API key…"/>
  <button onclick="testAll()">Test tutto</button>
  <button onclick="testDebug()">Debug raw</button>
  <button onclick="testSummary()">Summary</button>
</div>
<div class="box" id="healthBox" style="display:none"><h3>Health</h3><pre id="healthOut"></pre></div>
<div class="box" id="portfolioBox" style="display:none"><h3>Portfolio</h3><pre id="portfolioOut"></pre></div>
<div class="box" id="summaryBox" style="display:none"><h3>Summary</h3><pre id="summaryOut"></pre></div>
<div class="box" id="debugBox" style="display:none"><h3>Debug raw</h3><pre id="debugOut"></pre></div>

<script>
const PROXY='https://bitpanda-proxy.onrender.com';
function key(){return document.getElementById('apiKey').value.trim();}
async function call(endpoint,outId,boxId){
  const k=key();if(!k){alert('Inserisci API key');return;}
  document.getElementById(boxId).style.display='block';
  const out=document.getElementById(outId);
  out.textContent='Caricamento…';out.className='';
  try{
    const res=await fetch(PROXY+endpoint,{headers:{'X-API-KEY':k}});
    const data=await res.json();
    out.textContent=JSON.stringify(data,null,2);
    out.className=res.ok?'ok':'err';
  }catch(e){out.textContent='ERRORE: '+e.message;out.className='err';}
}
async function testAll(){
  await call('/health','healthOut','healthBox');
  await call('/portfolio','portfolioOut','portfolioBox');
  await call('/summary','summaryOut','summaryBox');
  await call('/debug','debugOut','debugBox');
}
function testDebug(){call('/debug','debugOut','debugBox');}
function testSummary(){call('/summary','summaryOut','summaryBox');}
</script>
</body>
</html>
